<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강남룸 예약</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    h1 {
      font-size: 52px;
      line-height: 1.2;
      margin: 0 0 28px;
      font-weight: 800;
    }

    .phone {
      font-size: 34px;
      font-weight: 800;
      color: #ff1a1a;
      margin: 0 0 28px;
    }

    .desc {
      font-size: 22px;
      line-height: 1.8;
      margin: 0 0 36px;
      font-weight: 600;
    }

    .btn {
      display: block;
      width: 260px;
      margin: 0 auto 18px;
      padding: 18px 20px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 800;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .btn-call {
      background: #ff1a1a;
      color: #ffffff;
    }

    .btn-kakao {
      background: #ffe600;
      color: #111111;
    }

    @media (max-width: 600px) {
      .wrap {
        padding: 28px 16px 48px;
      }

      h1 {
        font-size: 34px;
      }

      .phone {
        font-size: 28px;
      }

      .desc {
        font-size: 18px;
        line-height: 1.75;
      }

      .btn {
        width: 100%;
        max-width: 320px;
        font-size: 17px;
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>강남룸 / 강남쩜오 / 하퍼</h1>

    <div class="phone">010-5590-2230 <p> 공이사</p></div>

    <div class="desc">
      예약 및 문의 바로 가능합니다<br>
      지금 바로 연결 가능합니다<br>
      오늘 가능한 라인업 안내<br>
      빠른 입장 원하시면 바로 전화주세요
    </div>

    <a href="tel:01055902230" class="btn btn-call">📞 지금 바로 전화 연결</a>

    <a href="https://open.kakao.com/o/gYwrGwoi" class="btn btn-kakao">💬 지금 카톡 문의</a>
  </div>
</body>
</html>
